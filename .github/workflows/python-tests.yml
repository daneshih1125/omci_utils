name: Python Pytest CI

on:
  push:
    paths:
      - 'omci/**'
      - 'utils/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'omci/**'
      - 'utils/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Run Pytest
      run: |
        pytest -v
